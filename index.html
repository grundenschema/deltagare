<!DOCTYPE html>
<html lang="sv">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bokning – Podstudior och Oceanen</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5f5f4">

<style>

:root{
--bg:#f5f5f4;
--panel:#ffffff;
--line:#ddd6d3;
--text:#1f2937;
--muted:#6b7280;
--soft:#fafaf9;
--blue:#dbeafe;
--green:#dcfce7;
--yellow:#fef3c7;
--rose:#ffe4e6;
--purple:#ede9fe;
--teal:#ccfbf1;
}

*{
box-sizing:border-box
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:var(--text)
}

.app{
max-width:1380px;
margin:0 auto;
padding:24px
}

button{
border:1px solid var(--line);
background:#fff;
color:var(--text);
border-radius:12px;
padding:14px 18px;
font-size:1rem;
cursor:pointer
}

button:hover{
background:var(--soft)
}

input,select,textarea{
width:100%;
padding:12px;
border:1px solid var(--line);
border-radius:10px;
font:inherit;
background:#fff;
color:var(--text)
}

.screen{
display:none
}

.screen.active{
display:block
}

.home{
min-height:80vh;
display:flex;
flex-direction:column;
justify-content:center
}

.logo{
width:420px;
max-width:90%;
display:block;
margin:0 auto 38px auto
}

.home-buttons{
display:flex;
gap:18px;
flex-wrap:wrap;
justify-content:center
}

.home-buttons button{
min-width:280px;
font-size:1.15rem;
padding:20px 24px
}

</style>
</head>

<body>

<div class="app">

<section id="home" class="screen active">

<div class="home">

<img class="logo" src="Pippi_transparent.png" alt="Podstudio logga">

<div class="home-buttons">

<button onclick="openBookingArea('pod')">
Podstudior
</button>

<button onclick="openBookingArea('ocean')">
Oceanen / Filmrum
</button>

</div>

</div>

</section>

</div>

<script>

function openBookingArea(area){

alert("Här startar bokningssystemet för: " + area)

}

</script>

<script>

if ("serviceWorker" in navigator) {

navigator.serviceWorker.register("./service-worker.js")

}

</script>

</body>

</html>
