<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJELQjDoLIoqlp5LKsR8pxoNOQKXEq963Z_Qrp0ccaqXHShRRUQzroA-xTkpeNkThX/exec";

/* ===== Testpersoner ===== */
const DELTAGARE = ["Anna","Erik","Maria","Jonas","Sara","Peter","Lena","David","Karin","Mikael"];
const COACHER   = ["Sofia","Anders","Jessica","Tommy","Jaana","John","Emma","Rickard"];

/* ===== Färger per aktivitet ===== */
const FARGER = {
  "musik":      "#f3e5f5",
  "film":       "#e8eaf6",
  "lunch":      "#fff3e0",
  "frukost":    "#fff3e0",
  "promenad":   "#e8f5e9",
  "gym":        "#e0f2f1",
  "möte":       "#e3f2fd",
  "kommunikation": "#fce4ec",
  "yoga":       "#f1f8e9",
  "ateljé":     "#fff8e1",
  "default":    "#f5f5f5"
};

function fargFor(aktivitet) {
  const a = (aktivitet || "").toLowerCase();
  for (const [key, color] of Object.entries(FARGER)) {
    if (a.includes(key)) return color;
  }
  return FARGER.default;
}

/* ===== Veckonavigering ===== */
let veckoOffset = 0;
let DATA = [];
let redigeraId = null;
let redigeraData = null;

function mandagForVecka(offset) {
  const d = new Date();
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}

function isoDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

function veckodagar(offset) {
  const mon = mandagForVecka(offset);
  return Array.from({length:5}, (_,i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function formatVeckaLabel(days) {
  const opts = { day:"numeric", month:"short" };
  return `v.${veckonummer(days[0])} · ${days[0].toLocaleDateString("sv-SE",opts)} – ${days[4].toLocaleDateString("sv-SE",opts)}`;
}

function veckonummer(d) {
  const tmp = new Date(d);
  tmp.setHours(0,0,0,0);
  tmp.setDate(tmp.getDate() + 3 - (tmp.getDay()+6)%7);
  const w1 = new Date(tmp.getFullYear(),0,4);
  return 1 + Math.round(((tmp-w1)/86400000 - 3 + (w1.getDay()+6)%7)/7);
}

function byttVecka(delta) {
  if (delta === 0) veckoOffset = 0;
  else veckoOffset += delta;
  laddaData();
}

/* ===== Hämta data ===== */
async function laddaData() {
  document.getElementById("statusBar").textContent = "Laddar...";
  document.getElementById("calGrid").innerHTML = '<div class="loader" style="grid-column:1/-1">Laddar schema...</div>';

  try {
    const res = await fetch(SCRIPT_URL + "?offset=" + veckoOffset + "&t=" + Date.now());
    const json = await res.json();
    DATA = json.data || [];
    ritaSchema();
    document.getElementById("statusBar").textContent = "Uppdaterat " + new Date().toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
  } catch(e) {
    document.getElementById("statusBar").textContent = "Kunde inte ladda data: " + e.message;
    document.getElementById("calGrid").innerHTML = '<div class="loader" style="grid-column:1/-1; color:#c00">Fel vid laddning</div>';
  }
}

/* ===== Rita schema ===== */
const SLOTS_START = 8 * 60;
const SLOTS_END   = 16 * 60;
const SLOT_MIN    = 30;

function timeToMin(t) {
  const [h,m] = (t||"00:00").split(":").map(Number);
  return h*60+m;
}

function ritaSchema() {
  const days = veckodagar(veckoOffset);
  document.getElementById("weekLabel").textContent = formatVeckaLabel(days);

  const dagNamn = ["Måndag","Tisdag","Onsdag","Torsdag","Fredag"];
  const idag = isoDate(new Date());

  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";

  // Header-rad
  const tidHeader = document.createElement("div");
  tidHeader.className = "col-header time-col";
  tidHeader.textContent = "Tid";
  grid.appendChild(tidHeader);

  days.forEach((d,i) => {
    const h = document.createElement("div");
    h.className = "col-header";
    const isToday = isoDate(d) === idag;
    h.innerHTML = `<div>${dagNamn[i]}</div><div style="font-size:11px;opacity:.85">${d.toLocaleDateString("sv-SE",{day:"numeric",month:"short"})}${isToday?" 📍":""}</div>`;
    if (isToday) h.style.background = "#0d47a1";
    grid.appendChild(h);
  });

  // Tidsrader
  for (let m = SLOTS_START; m <= SLOTS_END; m += SLOT_MIN) {
    const h = Math.floor(m/60), mi = m%60;
    const tLabel = document.createElement("div");
    tLabel.className = "time-label";
    tLabel.textContent = mi === 0 ? String(h).padStart(2,"0")+":00" : "";
    grid.appendChild(tLabel);

    days.forEach(d => {
      const cell = document.createElement("div");
      cell.className = "day-cell";
      cell.dataset.date = isoDate(d);
      cell.dataset.time = String(h).padStart(2,"0")+":"+String(mi).padStart(2,"0");
      cell.ondblclick = () => {
        oppnaModal(null, cell.dataset.date, cell.dataset.time);
      };
      grid.appendChild(cell);
    });
  }

  // Placera aktiviteter
  const cells = [...grid.querySelectorAll(".day-cell")];
  const slotMins = [];
  for (let m = SLOTS_START; m <= SLOTS_END; m += SLOT_MIN) slotMins.push(m);

  DATA.forEach(r => {
    const dayIdx = days.findIndex(d => isoDate(d) === r.datum);
    if (dayIdx < 0) return;

    const sMin = timeToMin(r.start);
    const eMin = timeToMin(r.slut);
    if (eMin <= sMin) return;

    const sClamped = Math.max(sMin, SLOTS_START);
    const eClamped = Math.min(eMin, SLOTS_END + SLOT_MIN);

    const baseSlot = slotMins.findIndex(m => m <= sClamped && sClamped < m + SLOT_MIN);
    if (baseSlot < 0) return;

    const cellIdx = baseSlot * 6 + (dayIdx + 1);
    const firstCell = cells[cellIdx];
    if (!firstCell) return;

    const evt = document.createElement("div");
    evt.className = "evt";
    evt.style.background = fargFor(r.aktivitet);

    const cellH = 30;
    const topOff = ((sClamped - slotMins[baseSlot]) / SLOT_MIN) * cellH;
    const height = ((eClamped - sClamped) / SLOT_MIN) * cellH;
    evt.style.top = (2 + topOff) + "px";
    evt.style.height = Math.max(18, height - 4) + "px";
    evt.style.zIndex = 10;

    evt.innerHTML = `
      <div class="evt-time">🕒 ${r.start}–${r.slut}</div>
      <div class="evt-title">${r.aktivitet||""}</div>
      <div class="evt-people">${r.deltagare||""} ${r.coach ? "· "+r.coach : ""}</div>
    `;
    evt.onclick = () => oppnaModal(r);
    firstCell.appendChild(evt);
  });
}

/* ===== Modal – chips ===== */
let mDeltagare = [];
let mCoach = [];

function renderChips(arr, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  arr.forEach((n,i) => {
    const c = document.createElement("span");
    c.className = "chip";
    c.innerHTML = `${n} <button type="button">×</button>`;
    c.querySelector("button").onclick = () => { arr.splice(i,1); renderChips(arr,containerId); };
    el.appendChild(c);
  });
}

function kopplaInput(inputId, arr, chipsId, suggestions) {
  const inp = document.getElementById(inputId);
  inp.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === ",") {
      e.preventDefault();
      const v = inp.value.trim();
      if (v && !arr.some(n => n.toLowerCase() === v.toLowerCase())) {
        arr.push(v);
        renderChips(arr, chipsId);
      }
      inp.value = "";
    }
  });

  // Enkel autocomplete från testpersoner
  inp.setAttribute("list", inputId + "_list");
  const dl = document.createElement("datalist");
  dl.id = inputId + "_list";
  suggestions.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s;
    dl.appendChild(opt);
  });
  inp.parentNode.appendChild(dl);
}

/* ===== Öppna modal ===== */
function oppnaModal(rad, datum, tid) {
  mDeltagare = [];
  mCoach = [];
  redigeraId = null;
  redigeraData = null;

  document.getElementById("btnRadera").style.display = "none";

  if (rad) {
    // Redigera befintlig
    redigeraId = rad.id;
    redigeraData = rad;
    document.getElementById("modalRubrik").textContent = "Redigera aktivitet";
    document.getElementById("mAktivitet").value = rad.aktivitet || "";
    document.getElementById("mDatum").value = rad.datum || "";
    document.getElementById("mStart").value = rad.start || "09:00";
    document.getElementById("mSlut").value = rad.slut || "10:00";

    if (rad.deltagare) rad.deltagare.split(/,\s*/).filter(Boolean).forEach(n => mDeltagare.push(n.trim()));
    if (rad.coach) rad.coach.split(/,\s*/).filter(Boolean).forEach(n => mCoach.push(n.trim()));

    document.getElementById("btnRadera").style.display = "block";
  } else {
    // Ny aktivitet
    document.getElementById("modalRubrik").textContent = "Ny aktivitet";
    document.getElementById("mAktivitet").value = "";
    document.getElementById("mDatum").value = datum || isoDate(new Date());
    document.getElementById("mStart").value = tid || "09:00";
    const [h,m] = (tid||"09:00").split(":").map(Number);
    const slutH = String(h+1).padStart(2,"0");
    document.getElementById("mSlut").value = slutH + ":" + String(m).padStart(2,"0");
  }

  renderChips(mDeltagare, "mDeltagareChips");
  renderChips(mCoach, "mCoachChips");
  document.getElementById("overlay").classList.add("open");
}

function stangModal(e) {
  if (e && e.target !== document.getElementById("overlay")) return;
  document.getElementById("overlay").classList.remove("open");
}

/* ===== Spara ===== */
async function sparaAktivitet() {
  const aktivitet = document.getElementById("mAktivitet").value.trim();
  const datum = document.getElementById("mDatum").value;
  const start = document.getElementById("mStart").value;
  const slut  = document.getElementById("mSlut").value;

  if (!aktivitet || !datum || !start || !slut) {
    alert("Fyll i minst aktivitet, datum och tid.");
    return;
  }

  let titel = "";
  if (mDeltagare.length) titel += mDeltagare.join(", ") + " - ";
  titel += aktivitet;
  if (mCoach.length) titel += " (" + mCoach.join(", ") + ")";

  const startISO = datum + "T" + start + ":00+02:00";
  const slutISO  = datum + "T" + slut  + ":00+02:00";

  document.getElementById("statusBar").textContent = "Sparar...";

  await fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ title: titel, start: startISO, end: slutISO })
  });

  await new Promise(r => setTimeout(r, 2000));
  document.getElementById("overlay").classList.remove("open");
  await laddaData();
}

/* ===== Radera ===== */
async function raderaAktivitet() {
  if (!redigeraId) return;
  if (!confirm("Radera aktiviteten?")) return;

  document.getElementById("statusBar").textContent = "Raderar...";

  await fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "delete", id: redigeraId })
  });

  await new Promise(r => setTimeout(r, 2000));
  document.getElementById("overlay").classList.remove("open");
  await laddaData();
}

/* ===== Init ===== */
window.addEventListener("load", () => {
  kopplaInput("mDeltagareInput", mDeltagare, "mDeltagareChips", DELTAGARE);
  kopplaInput("mCoachInput", mCoach, "mCoachChips", COACHER);
  laddaData();
});
