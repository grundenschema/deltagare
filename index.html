<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grunden – Testformulär</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: white;
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  h1 {
    font-size: 22px;
    font-weight: 800;
    color: #1a1a2e;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
  }

  .field {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    color: #222;
    background: #fafafa;
    transition: border-color 0.15s;
    outline: none;
  }

  input:focus {
    border-color: #3b82f6;
    background: #fff;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  button {
    width: 100%;
    padding: 13px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s;
  }

  button:hover { background: #2563eb; }
  button:disabled { background: #93c5fd; cursor: not-allowed; }

  .status {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    display: none;
    text-align: center;
  }

  .status.success {
    background: #d1fae5;
    color: #065f46;
    display: block;
  }

  .status.error {
    background: #fee2e2;
    color: #991b1b;
    display: block;
  }

  .status.loading {
    background: #dbeafe;
    color: #1e40af;
    display: block;
  }
</style>
</head>
<body>

<div class="card">
  <h1>📅 Lägg till aktivitet</h1>
  <p class="subtitle">Testformulär – skriver till testkalendern</p>

  <div class="field">
    <label>Titel</label>
    <input type="text" id="titel" placeholder="t.ex. Musikgruppen" />
  </div>

  <div class="field">
    <label>Datum</label>
    <input type="date" id="datum" />
  </div>

  <div class="row">
    <div class="field">
      <label>Starttid</label>
      <input type="time" id="start" value="09:00" />
    </div>
    <div class="field">
      <label>Sluttid</label>
      <input type="time" id="slut" value="10:00" />
    </div>
  </div>

  <button id="btnSpara" onclick="spara()">Spara till kalender</button>

  <div class="status" id="status"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyJ8wJiL2PY4a_vzegP82Gwqh4PwI7Jc_MxP9RvDehD2EGeDMdAOTtgwOXLyyvCozBV/exec";

// Sätt dagens datum som default
document.getElementById("datum").value = new Date().toISOString().slice(0,10);

function visaStatus(typ, text) {
  const el = document.getElementById("status");
  el.className = "status " + typ;
  el.textContent = text;
}

async function spara() {
  const titel  = document.getElementById("titel").value.trim();
  const datum  = document.getElementById("datum").value;
  const start  = document.getElementById("start").value;
  const slut   = document.getElementById("slut").value;

  if (!titel || !datum || !start || !slut) {
    visaStatus("error", "Fyll i alla fält.");
    return;
  }

  if (start >= slut) {
    visaStatus("error", "Sluttid måste vara efter starttid.");
    return;
  }

  const btn = document.getElementById("btnSpara");
  btn.disabled = true;
  visaStatus("loading", "Sparar...");

  const startISO = datum + "T" + start + ":00";
  const slutISO  = datum + "T" + slut  + ":00";

  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({ title: titel, start: startISO, end: slutISO })
    });
    const json = await res.json();

    if (json.success) {
      visaStatus("success", "✅ Aktiviteten sparades i testkalendern!");
      // Rensa formuläret
      document.getElementById("titel").value = "";
    } else {
      visaStatus("error", "Fel: " + (json.error || "Okänt fel"));
    }
  } catch(e) {
    visaStatus("error", "Kunde inte nå scriptet. Kontrollera URL:en.");
  }

  btn.disabled = false;
}
</script>

</body>
</html>
